# vim: ft=sh

# Terminal =======================================================================

set -g default-terminal 'tmux-256color'
set -as terminal-overrides ',*256col*:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'                                                        # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # underscore colors - needs tmux-3.0
set -s escape-time 0

# Prefix =========================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General options ================================================================

set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g status-position top
set -g allow-passthrough on

# Keybinds =======================================================================

# Config reload
bind r source-file $HOME/.config/tmux/tmux.conf\; display-message "reloaded tmux.conf"

# Kill without prompt
bind x kill-pane
bind X kill-session

# Splits — retain current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Sesh session manager
bind-key "t" display-popup -E -w 40% -h 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --no-sort --fuzzy --no-strip-ansi --placeholder 'Pick a sesh' --height 50 --prompt=' '
)\""
bind -N "last-session (via sesh) " L run-shell "sesh last"

# Tool popups
bind g popup -EE -w 90% -h 90% -d "#{pane_current_path}" lazygit
bind G popup -EE -w 90% -h 90% -d "#{pane_current_path}" gh dash
bind T popup -EE -w 90% -h 90% taproom
bind å new-window -c "~/repos/spp/private-scripts/AzurePowershell/" pwsh ./Pimmy.ps1
bind n new-window -d -c "#{pane_current_path}" pkgrun dev
bind N popup -EE -w 50% -h 50% -d "#{pane_current_path}" pkgrun build
bind s split-window -h -l 25% -c "#{pane_current_path}" storecode --yolo
bind o split-window -h -l 25% -c "#{pane_current_path}" opencode

# Plugins ========================================================================

set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin 'mrjones2014/smart-splits.nvim'

# -- tmux-agent-sidebar ----------------------------------------------------------

set -g @sidebar_width "15%"
set -g @sidebar_auto_create "off"

# Status and filter colors
set -g @sidebar_color_all            "#9ccfd8"  # Foam     — selected "all" filter
set -g @sidebar_color_running        "#31748f"  # Pine     — running status
set -g @sidebar_color_waiting        "#f6c177"  # Gold     — waiting status / version banner
set -g @sidebar_color_idle           "#908caa"  # Subtle   — idle status
set -g @sidebar_color_error          "#eb6f92"  # Love     — error status
set -g @sidebar_color_filter_inactive "#6e6a86" # Muted    — unselected icons / zero counts

# Structural colors
set -g @sidebar_color_border         "#524f67"  # Highlight High — borders / tab separators
set -g @sidebar_color_accent         "#9ccfd8"  # Foam     — active pane marker / brand color
set -g @sidebar_color_session        "#31748f"  # Pine     — session name
set -g @sidebar_color_selection      "#403d52"  # Highlight Med  — selected row background

# Agent colors
set -g @sidebar_color_agent_claude   "#eb6f92"  # Love     — Claude brand
set -g @sidebar_color_agent_codex    "#c4a7e7"  # Iris     — Codex brand
set -g @sidebar_color_agent_opencode "#9ccfd8"  # Foam     — OpenCode brand

# Text colors
set -g @sidebar_color_text_active    "#e0def4"  # Text     — primary / active rows
set -g @sidebar_color_text_muted     "#908caa"  # Subtle   — secondary / tree branches
set -g @sidebar_color_text_inactive  "#6e6a86"  # Muted    — unfocused pane body text
set -g @sidebar_color_port           "#908caa"  # Subtle   — port numbers
set -g @sidebar_color_wait_reason    "#f6c177"  # Gold     — wait reason text
set -g @sidebar_color_response_arrow "#9ccfd8"  # Foam     — response arrow

# Task and sub-agent colors
set -g @sidebar_color_task_progress  "#f6c177"  # Gold     — task progress summary
set -g @sidebar_color_subagent       "#31748f"  # Pine     — sub-agent tree

# Git tab colors
set -g @sidebar_color_branch         "#31748f"  # Pine     — git branch name
set -g @sidebar_color_commit_hash    "#f6c177"  # Gold     — commit hash
set -g @sidebar_color_diff_added     "#31748f"  # Pine     — added diff lines
set -g @sidebar_color_diff_deleted   "#eb6f92"  # Love     — deleted diff lines
set -g @sidebar_color_file_change    "#f6c177"  # Gold     — file change stats
set -g @sidebar_color_pr_link        "#9ccfd8"  # Foam     — PR link / number

# Section titles and timestamps
set -g @sidebar_color_section_title      "#31748f"  # Pine     — section titles
set -g @sidebar_color_activity_timestamp "#908caa"  # Subtle   — timestamps (less prominent)

set -g @plugin 'hiroppy/tmux-agent-sidebar'

# -- catppuccin ------------------------------------------------------------------

set -g @plugin "catppuccin/tmux#v2.3.0"
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

run 'tpack init'

# Colors =========================================================================
# Rose Pine overrides applied after catppuccin loads

set -g @thm_bg "#191724"
set -g @thm_fg "#e0def4"
set -g @thm_red "#eb6f92"
set -g @thm_green "#31748f"
set -g @thm_blue "#9ccfd8"
set -g @thm_purple "#c4a7e7"
set -g @thm_yellow "#f6c177"
set -g @thm_magenta "#ebbcba"
set -g @thm_overlay_0 "#26233a"
set -g @thm_surface_0 "#403d52"

# Status bar =====================================================================

# -- Status left -----------------------------------------------------------------

set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_fg}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_purple}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# -- Status right ----------------------------------------------------------------

set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_green}]#(cd #{pane_current_path} && if [ -f package.json ]; then node -v 2>/dev/null | sed 's/^/ /'; fi) "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#(cd #{pane_current_path} && if [ -f package.json ]; then printf '│ '; fi)"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}]#(cd #{pane_current_path} && if find . -maxdepth 1 -name '*.sln' -o -name '*.csproj' -o -name '*.fsproj' -o -name 'global.json' 2>/dev/null | grep -q .; then dotnet --version 2>/dev/null | sed 's/^/󰌛 /'; fi) "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#(cd #{pane_current_path} && if find . -maxdepth 1 -name '*.sln' -o -name '*.csproj' -o -name '*.fsproj' -o -name 'global.json' 2>/dev/null | grep -q .; then printf '│ '; fi)"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_purple}]#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^/󰘬 /') "

# -- Status general --------------------------------------------------------------

set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# -- Pane borders ----------------------------------------------------------------

setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_purple}"
setw -g pane-border-lines single

# -- Popup borders ---------------------------------------------------------------

set -g popup-border-style "bg=#{@thm_bg},fg=#{@thm_purple}"
set -g popup-style "bg=#{@thm_bg},fg=default"
set -g popup-border-lines single

# -- Window tabs -----------------------------------------------------------------

set -wg automatic-rename on
set -g automatic-rename-format "Window"
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_magenta}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_magenta}"
set -g window-status-activity-style "bg=#{@thm_magenta},fg=#{@thm_bg},bold"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_magenta},fg=#{@thm_bg},bold"
