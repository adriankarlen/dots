# vim: ft=tmux

# Terminal =======================================================================

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*256col*:RGB"
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
set -s escape-time 0

# Prefix =========================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General options ================================================================

set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g status-position top
set -g allow-passthrough on

# Keybinds =======================================================================

# Config reload
bind r source-file $HOME/.config/tmux/tmux.conf\; display-message "reloaded tmux.conf"

# Kill without prompt
bind x kill-pane
bind X kill-session

# Splits — retain current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Sesh session manager
bind-key "t" display-popup -E -w 40% -h 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --no-sort --fuzzy --no-strip-ansi --placeholder 'Pick a sesh' --height 50 --prompt=' '
)\""
bind -N "last-session (via sesh) " L run-shell "sesh last"

# Tool popups
bind g popup -EE -w 90% -h 90% -d "#{pane_current_path}" lazygit
bind G popup -EE -w 90% -h 90% -d "#{pane_current_path}" gh dash
bind T popup -EE -w 90% -h 90% taproom
bind å new-window -c "~/repos/spp/private-scripts/AzurePowershell/" pwsh ./Pimmy.ps1
bind n new-window -d -c "#{pane_current_path}" pkgrun dev
bind N popup -EE -w 50% -h 50% -d "#{pane_current_path}" pkgrun build
bind s split-window -h -l 25% -c "#{pane_current_path}" storecode --yolo
bind o split-window -h -l 25% -c "#{pane_current_path}" opencode

# Plugins ========================================================================

set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "mrjones2014/smart-splits.nvim"

# -- tmux-agent-sidebar ----------------------------------------------------------

set -g @sidebar_width "15%"
set -g @sidebar_auto_create "off"

# Status and filter colors
set -g @sidebar_color_all "#9ccfd8"
set -g @sidebar_color_running "#31748f"
set -g @sidebar_color_waiting "#f6c177"
set -g @sidebar_color_idle "#908caa"
set -g @sidebar_color_error "#eb6f92"
set -g @sidebar_color_filter_inactive "#6e6a86"

# Structural colors
set -g @sidebar_color_border "#524f67"
set -g @sidebar_color_accent "#9ccfd8"
set -g @sidebar_color_session "#31748f"
set -g @sidebar_color_selection "#403d52"

# Agent colors
set -g @sidebar_color_agent_claude "#eb6f92"
set -g @sidebar_color_agent_codex "#c4a7e7"
set -g @sidebar_color_agent_opencode "#9ccfd8"

# Text colors
set -g @sidebar_color_text_active "#e0def4"
set -g @sidebar_color_text_muted "#908caa"
set -g @sidebar_color_text_inactive "#6e6a86"
set -g @sidebar_color_port "#908caa"
set -g @sidebar_color_wait_reason "#f6c177"
set -g @sidebar_color_response_arrow "#9ccfd8"

# Task and sub-agent colors
set -g @sidebar_color_task_progress "#f6c177"
set -g @sidebar_color_subagent "#31748f"

# Git tab colors
set -g @sidebar_color_branch "#31748f"
set -g @sidebar_color_commit_hash "#f6c177"
set -g @sidebar_color_diff_added "#31750f"
set -g @sidebar_color_diff_deleted "#eb6f92"
set -g @sidebar_color_file_change "#f6c177"
set -g @sidebar_color_pr_link "#9ccfd8"

# Section titles and timestamps
set -g @sidebar_color_section_title "#31748f"
set -g @sidebar_color_activity_timestamp "#908caa"

set -g @plugin "hiroppy/tmux-agent-sidebar"

# -- Rosé Pine -------------------------------------------------------------------

set -g @plugin "rose-pine/tmux"

# -- Status left -----------------------------------------------------------------
set -g @rose_pine_show_current_program "on"
set -g @rose_pine_show_pane_directory "on"

# -- Status right ----------------------------------------------------------------

set -g @rose_pine_user "on"
set -g @rose_pine_directory "on"

# -- Status general --------------------------------------------------------------

set -g @rose_pine_bar_bg_disabled_color_option "default"
set -g @rose_pine_default_window_behavior "on"
set -g @rose_pine_left_separator "    "
set -g @rose_pine_right_separator "   "
set -g @rose_pine_window_separator "   "
set -g @rose_pine_username_icon "󰝴"

set -g @rose_pine_prioritize_windows "on"
set -g @rose_pine_width_to_hide "80"
set -g @rose_pine_window_count "5"

set -g status-justify "absolute-centre"

# -- tpack -----------------------------------------------------------------------

run "tpack init"
