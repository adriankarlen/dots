# vim: ft=sh
set -g default-terminal 'tmux-256color'
set -as terminal-overrides ',*256col*:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'                                                        # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # underscore colors - needs tmux-3.0
set -s escape-time 0

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g status-position top

set -g popup-border-style "bg=#1f1d2e,fg=default"
set -g popup-style "bg=#1f1d2e,fg=default"
set -g popup-border-lines "padded"

bind r source-file $HOME/.config/tmux/tmux.conf\; display-message "reloaded tmux.conf"
bind x kill-pane # skip "kill-pane 1? (y/n)" prompt
bind X kill-session

#sesh
bind-key "t" display-popup -E -w 40% -h 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --no-sort --fuzzy --no-strip-ansi --placeholder 'Pick a sesh' --height 50 --prompt=' '
)\""
bind -N "last-session (via sesh) " L run-shell "sesh last"

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# retain current path on splits
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# tools popups
bind g popup -EE -w 90% -h 90% -d "#{pane_current_path}" lazygit
bind G popup -EE -w 90% -h 90% -d "#{pane_current_path}" gh dash
bind T popup -EE -w 90% -h 90% taproom
bind å new-window -c "~/repos/spp/private-scripts/AzurePowershell/" pwsh ./Pimmy.ps1
bind n new-window -d -c "#{pane_current_path}" npm run dev
bind S if-shell "tmux list-panes -F '#{pane_current_command}' | grep -q '^claude$'" \
  "run-shell \"tmux list-panes -F '#{pane_id}:#{pane_current_command}' | grep ':claude$' | cut -d: -f1 | xargs tmux kill-pane -t\"" \
  "split-window -h -l 30% -c '#{pane_current_path}' storecode"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"

set -g @plugin "rose-pine/tmux"
set -g @rose_pine_variant "main"
set -g @rose_pine_bar_bg_disabled_color_option 'default'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_user "on"
set -g @rose_pine_directory "on"
set -g @rose_pine_show_current_program "on"
set -g @rose_pine_date_time ""
set -g @rose_pine_username_icon "󰝴 "
set -g @rose_pine_left_separator "  "
set -g @rose_pine_right_separator "  "
set -g @rose_pine_field_separator "  "
set -g @rose_pine_window_separator "  "
set -g @rose_pine_status_left_prepend_section " "

run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'
